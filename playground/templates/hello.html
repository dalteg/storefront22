<html>
    <body>
       {% if name %}
           <h1>Hello {{ name }}</h1>
       {% else %}
           <h1>Hello World</h1>
       {% endif %}

       <ul>
           {% for customer in result %}
               <li>
                   {{ customer.first_name }} - {{ customer.last_name }} - {{ customer.full_name}}
               </li>
           {% endfor %}
       </ul>

    </body>
</html>
